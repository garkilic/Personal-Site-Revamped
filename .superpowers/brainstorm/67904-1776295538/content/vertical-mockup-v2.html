<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — griffin arkilic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f9fafb;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    font-family: sans-serif;
  }
  .browser-frame {
    width: 620px;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }
  .browser-chrome {
    background: #f3f4f6;
    padding: 10px 16px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-red { background: #ef4444; }
  .dot-yellow { background: #f59e0b; }
  .dot-green { background: #22c55e; }
  .url-bar {
    flex: 1;
    background: white;
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 11px;
    color: #6b7280;
    font-family: monospace;
  }
  .page {
    background: #ffffff;
    padding: 60px 52px 80px;
    font-family: 'Courier New', Courier, monospace;
    color: #1d4ed8;
    min-height: 300px;
  }
  .name { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  .bio { color: #6b7280; margin-bottom: 32px; font-size: 13px; }
  .project { margin-bottom: 10px; font-size: 13px; }
  .project a { color: #1d4ed8; text-decoration: none; }
  .footer { margin-top: 40px; font-size: 12px; color: #6b7280; }
  .footer a { color: #3b82f6; text-decoration: none; margin-right: 16px; }
</style>
</head>
<body>
<div class="browser-frame">
  <div class="browser-chrome">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
    <div class="url-bar">griffinarkilic.com</div>
  </div>
  <div class="page">
    <div class="name">griffin arkilic</div>
    <div class="bio">building things</div>
    <div class="project">solution threads — ai workflows for ria practices <a href="#">↗</a></div>
    <div class="project">spend later — ios deferred spending app <a href="#">↗</a></div>
    <div class="footer">
      <a href="#">github</a>
      <a href="#">email</a>
      <a href="#">resume</a>
    </div>
  </div>
</div>
</body>
</html>
