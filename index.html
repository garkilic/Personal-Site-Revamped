<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>griffin arkilic — builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="container">

    <div class="name">griffin arkilic — builder</div>
    <div class="tagline">building things</div>
    <div class="location">los angeles, ca</div>

    <div class="projects">
      <div class="project">
        <a href="https://punk-ventures.com" target="_blank" rel="noopener">punk ventures llc ↗</a> — Building small, profitable digital businesses that deliver.
      </div>
    </div>

    <div class="chat">
      <div class="chat-header">
        <span class="chat-title">chat with ai griffin until you meet real griffin</span>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" type="text" placeholder="ask something..." maxlength="500" autocomplete="off" />
        <button class="chat-submit" id="chat-submit">↵</button>
      </div>
    </div>

    <div class="bside">
      <div class="bside-label">cool side projects</div>
      <div class="bside-links">
        <a href="https://job-search-inky.vercel.app/" target="_blank" rel="noopener">free job tracker ↗</a>
        <a href="https://workbook.punk-ventures.com/" target="_blank" rel="noopener">digital workbook ↗</a>
        <a href="https://apps.apple.com/us/app/spend-later/id6753609229" target="_blank" rel="noopener">spend later ↗</a>
      </div>
    </div>

    <div class="footer">
      <a href="https://github.com/garkilic" target="_blank" rel="noopener">github</a>
      <button onclick="copyEmail()" id="email-btn">email</button>
      <a href="Files/Griffin%20Arkilic%20Resume.pdf" target="_blank">resume</a>
    </div>

  </div>

  <script>
    (function () {
      var history = [];
      var input = document.getElementById('chat-input');
      var messagesEl = document.getElementById('chat-messages');
      var submitBtn = document.getElementById('chat-submit');

      function addLine(speaker, text) {
        var line = document.createElement('div');
        line.className = 'chat-line';

        var speakerSpan = document.createElement('span');
        speakerSpan.className = 'speaker';
        speakerSpan.textContent = speaker + ': ';

        var textSpan = document.createElement('span');
        textSpan.className = 'text';
        textSpan.textContent = text;

        line.appendChild(speakerSpan);
        line.appendChild(textSpan);
        messagesEl.appendChild(line);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return textSpan;
      }

      addLine('ai griffin', 'i\'m a bot with all of griffin\'s information and none of his charm. ask me something.');

      function renderWithLinks(el, text) {
        el.textContent = '';
        var emailPat = 'garkilic@gmail.com';
        var liPat = /https?:\/\/(?:www\.)?linkedin\.com\/in\/griffin-arkilic\/?/;
        var parts = text.split(/(garkilic@gmail\.com|https?:\/\/(?:www\.)?linkedin\.com\/in\/griffin-arkilic\/?)/);
        parts.forEach(function(part) {
          if (!part) return;
          var a;
          if (part === emailPat) {
            a = document.createElement('a');
            a.href = 'mailto:garkilic@gmail.com';
            a.textContent = 'garkilic@gmail.com';
            el.appendChild(a);
          } else if (liPat.test(part)) {
            a = document.createElement('a');
            a.href = 'https://www.linkedin.com/in/griffin-arkilic/';
            a.target = '_blank';
            a.rel = 'noopener';
            a.textContent = 'linkedin.com/in/griffin-arkilic';
            el.appendChild(a);
          } else {
            el.appendChild(document.createTextNode(part));
          }
        });
      }

      async function send() {
        var msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        input.disabled = true;
        submitBtn.disabled = true;

        addLine('you', msg);
        var thinkingSpan = addLine('ai griffin', '...');

        try {
          var res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, history: history }),
          });
          var data = await res.json();
          var reply = data.reply || 'something went wrong';
          renderWithLinks(thinkingSpan, reply);
          history.push({ role: 'user', content: msg });
          history.push({ role: 'assistant', content: reply });
          if (history.length > 12) history = history.slice(-12);
        } catch {
          thinkingSpan.textContent = 'something went wrong, try again';
        }

        input.disabled = false;
        submitBtn.disabled = false;
        input.focus();
      }

      submitBtn.addEventListener('click', send);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') send();
      });
    })();

    function copyEmail() {
      navigator.clipboard.writeText('garkilic@gmail.com');
      const btn = document.getElementById('email-btn');
      btn.textContent = 'copied!';
      setTimeout(() => { btn.textContent = 'email'; }, 2000);
    }
  </script>
</body>
</html>
